<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tageszähler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏲️</text></svg>">
<style>
:root {
  --md-sys-color-primary:              #6750A4;
  --md-sys-color-on-primary:           #FFFFFF;
  --md-sys-color-primary-container:    #EADDFF;
  --md-sys-color-on-primary-container: #21005D;
  --md-sys-color-secondary:            #625B71;
  --md-sys-color-secondary-container:  #E8DEF8;
  --md-sys-color-surface:              #FEF7FF;
  --md-sys-color-surface-variant:      #E7E0EC;
  --md-sys-color-on-surface:           #1C1B1F;
  --md-sys-color-on-surface-variant:   #49454F;
  --md-sys-color-outline:              #79747E;
  --md-sys-color-outline-variant:      #CAC4D0;
  --md-sys-color-background:           #FEF7FF;
  --md-sys-color-error:                #B3261E;
  --md-elevation-1: 0 1px 2px rgba(0,0,0,.12), 0 2px 4px rgba(0,0,0,.08);
  --md-elevation-2: 0 1px 2px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.10);
  --md-elevation-3: 0 2px 6px rgba(0,0,0,.16), 0 4px 16px rgba(0,0,0,.12);
  --md-shape-small:  12px;
  --md-shape-medium: 16px;
  --md-shape-large:  28px;
  --md-shape-xl:     36px;
  --font: 'Google Sans', 'Roboto Flex', Roboto, system-ui, sans-serif;
  --ts: 300ms cubic-bezier(0.2, 0, 0, 1);
  --te: 400ms cubic-bezier(0.05, 0.7, 0.1, 1);
  --flip-bg:    #1C1B1F;
  --flip-text:  #EADDFF;
  --flip-split: #6750A4;
}
@media (prefers-color-scheme: dark) {
  :root {
    --md-sys-color-primary:              #D0BCFF;
    --md-sys-color-on-primary:           #381E72;
    --md-sys-color-primary-container:    #4F378B;
    --md-sys-color-on-primary-container: #EADDFF;
    --md-sys-color-secondary:            #CCC2DC;
    --md-sys-color-secondary-container:  #4A4458;
    --md-sys-color-surface:              #141218;
    --md-sys-color-surface-variant:      #49454F;
    --md-sys-color-on-surface:           #E6E1E5;
    --md-sys-color-on-surface-variant:   #CAC4D0;
    --md-sys-color-outline:              #938F99;
    --md-sys-color-outline-variant:      #49454F;
    --md-sys-color-background:           #141218;
    --md-sys-color-error:                #F2B8B5;
    --flip-bg: #2B2930;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--md-sys-color-background);
  color: var(--md-sys-color-on-surface);
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

.ripple-host { position: relative; overflow: hidden; }
.ripple-wave {
  position: absolute; border-radius: 50%;
  background: currentColor; opacity: 0; pointer-events: none;
  transform: scale(0); animation: ripple 600ms ease-out forwards;
}
@keyframes ripple { 0% { transform:scale(0); opacity:.22; } 100% { transform:scale(4); opacity:0; } }

/* ── Unified Layout ── */
.app-container {
  max-width: 1400px;
  margin: 0 auto;
  padding-bottom: 96px;
}

.app-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px;
  position: sticky; top: 0; z-index: 100;
  background: var(--md-sys-color-background);
}
.app-bar-title { font-size: 1.375rem; font-weight: 600; letter-spacing: -.01em; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent;
  color: var(--md-sys-color-on-surface); display: flex; align-items: center; justify-content: center; cursor: pointer;
}

.tab-bar {
  display: flex; border-bottom: 1px solid var(--md-sys-color-outline-variant);
  padding: 0 20px; position: relative; margin-bottom: 16px;
}
.tab-item {
  flex: 1; text-align: center; padding: 14px 4px 13px;
  font-size: .875rem; font-weight: 600; color: var(--md-sys-color-on-surface-variant);
  cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; transition: color var(--ts);
}
.tab-item.active { color: var(--md-sys-color-primary); }
.tab-indicator {
  position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 3px 3px 0 0;
  background: var(--md-sys-color-primary); transition: left var(--ts), width var(--ts);
}

.tab-content { display: none; padding: 0 20px; }
.tab-content.active { display: block; }

.event-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ── Event Card ── */
.event-card {
  border-radius: var(--md-shape-large);
  overflow: hidden; cursor: pointer; position: relative;
  min-height: 172px; padding: 20px 16px 16px;
  display: flex; flex-direction: column; justify-content: flex-end;
  box-shadow: var(--md-elevation-1); background: var(--md-sys-color-surface-variant);
  -webkit-tap-highlight-color: transparent; transition: transform 200ms, box-shadow 200ms;
}
.event-card:active { transform: scale(.98); box-shadow: none; }
.card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 400ms; pointer-events: none; }
.event-card:hover .card-bg { transform: scale(1.03); }
.card-scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.35) 60%, transparent 100%); pointer-events: none; }
.card-content { position: relative; z-index: 1; display: flex; flex-direction: column; width: 100%; }

.card-name { font-size: .875rem; font-weight: 600; color: rgba(255,255,255,.9); margin-bottom: 6px; line-height: 1.2; }

.card-progress-wrap { width: 100%; height: 4px; background: rgba(255,255,255,.18); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.card-progress-bar { height: 100%; border-radius: 2px; background: var(--md-sys-color-primary); transition: width 1s linear; min-width: 2px; }
.card-progress-label { font-size: .65rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-bottom: 4px; }
.event-card.past-card .card-progress-bar { background: #69D189; }

/* ── Flip Clock ── */
.flip-clock { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.flip-col { display: flex; flex-direction: column; align-items: center; }
.flip-digits-row { display: flex; gap: 1px; }
.flip-digit-wrap { position: relative; width: 26px; height: 34px; perspective: 80px; }
.flip-digit-wrap.wide { width: 34px; }
.flip-face {
  position: absolute; inset: 0; border-radius: 4px; background: var(--flip-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; color: var(--flip-text); font-variant-numeric: tabular-nums;
  overflow: hidden; backface-visibility: hidden;
}
.flip-face::after { content: ''; position: absolute; left:0; right:0; top:50%; height:1px; background: var(--flip-split); opacity:.55; }
.flip-face-top    { clip-path: polygon(0 0,100% 0,100% 50%,0 50%); }
.flip-face-bottom { clip-path: polygon(0 50%,100% 50%,100% 100%,0 100%); }
.flip-face-front  { z-index: 2; }
.flip-face-back   { z-index: 1; transform: rotateX(180deg); }

.flip-digit-wrap.flipping .flip-face-front { animation: flip-top 340ms ease-in forwards; }
.flip-digit-wrap.flipping .flip-face-back  { animation: flip-bot 340ms ease-out forwards; }
@keyframes flip-top { 0%{transform:rotateX(0deg)} 100%{transform:rotateX(-90deg)} }
@keyframes flip-bot { 0%{transform:rotateX(180deg)} 100%{transform:rotateX(90deg)} }

.flip-label { font-size: .5rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-top: 2px; }
.flip-unit-sep { width: 4px; }

.card-direction-badge {
  display: inline-flex; align-items: center; gap: 4px; font-size: .65rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #69D189; margin-bottom: 4px;
}
.card-direction-badge svg { width: 12px; height: 12px; }

/* ── Empty State ── */
.empty-state { display: flex; flex-direction: column; align-items: center; padding: 64px 20px; color: var(--md-sys-color-on-surface-variant); text-align: center; grid-column: 1 / -1; max-width: 440px; margin: 0 auto; }
.empty-icon-circle { width: 68px; height: 68px; border-radius: 50%; background: var(--md-sys-color-secondary-container); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
.empty-icon-circle svg { width: 34px; height: 34px; stroke: var(--md-sys-color-secondary); }
.empty-headline { font-size: 1rem; font-weight: 600; color: var(--md-sys-color-on-surface); margin-bottom: 6px; }
.empty-body { font-size: .875rem; line-height: 1.6; }

/* ── FAB (Bottom Right) ── */
.fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  height: 56px; padding: 0 20px 0 16px;
  border-radius: var(--md-shape-large); border: none;
  background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);
  font-family: var(--font); font-size: .875rem; font-weight: 700; letter-spacing: .006em;
  display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: var(--md-elevation-3);
  -webkit-tap-highlight-color: transparent; transition: transform var(--ts), box-shadow var(--ts);
}
.fab:active { transform: scale(.93); box-shadow: var(--md-elevation-1); }
.fab svg { width: 22px; height: 22px; }

/* ── Modals & Backdrops ── */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.54); z-index: 300; opacity: 0; pointer-events: none; transition: opacity var(--ts); }
.backdrop.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  max-height: 93dvh; overflow-y: auto;
  border-radius: var(--md-shape-xl) var(--md-shape-xl) 0 0;
  background: var(--md-sys-color-surface); box-shadow: var(--md-elevation-3);
  transform: translateY(100%); transition: transform var(--te);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 32px; height: 4px; border-radius: 2px; background: var(--md-sys-color-outline-variant); margin: 12px auto 0; }

@media (min-width: 768px) {
  .sheet { max-width: 600px; left: 50%; transform: translateX(-50%) translateY(100%); border-radius: var(--md-shape-xl); }
  .sheet.open { transform: translateX(-50%) translateY(0); }
}

/* Detail Sheet */
.detail-hero { position: relative; height: 240px; background: var(--md-sys-color-surface-variant); }
.detail-hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.detail-scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 70%); }
.detail-hero-text { position: absolute; bottom: 0; padding: 20px; }
.detail-hero-title { font-size: 1.375rem; font-weight: 700; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.5); }
.detail-close-btn { position: absolute; top: 12px; left: 12px; width: 48px; height: 48px; border-radius: 50%; background: rgba(0,0,0,.4); border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }

.detail-progress-wrap { margin: 20px 20px 0; background: var(--md-sys-color-surface-variant); border-radius: var(--md-shape-medium); padding: 14px 16px; }
.detail-progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.detail-progress-label { font-size: .75rem; font-weight: 700; color: var(--md-sys-color-on-surface-variant); }
.detail-progress-pct { font-size: 1.1rem; font-weight: 800; color: var(--md-sys-color-primary); }
.detail-progress-track { height: 6px; border-radius: 3px; background: var(--md-sys-color-outline-variant); overflow: hidden; }
.detail-progress-fill { height: 100%; border-radius: 3px; background: var(--md-sys-color-primary); transition: width 1s ease; min-width: 3px; }
.detail-progress-wrap.past-progress .detail-progress-fill { background: #4CAF50; }
.detail-progress-wrap.past-progress .detail-progress-pct { color: #4CAF50; }

.detail-flip-clock { padding: 20px 20px 4px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.detail-flip-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.detail-flip-digits-row { display: flex; gap: 2px; }
.detail-flip-digit-wrap { position: relative; width: 44px; height: 58px; perspective: 120px; }
.detail-flip-digit-wrap.wide { width: 56px; }
.detail-flip-face { position: absolute; inset: 0; border-radius: 8px; background: var(--flip-bg); display: flex; align-items: center; justify-content: center; font-size: 1.75rem; font-weight: 700; color: var(--flip-text); font-variant-numeric: tabular-nums; overflow: hidden; backface-visibility: hidden; }
.detail-flip-face::after { content:''; position:absolute; left:0; right:0; top:50%; height:1.5px; background:var(--flip-split); opacity:.65; }
.detail-flip-face.flip-face-top { clip-path: polygon(0 0,100% 0,100% 50%,0 50%); }
.detail-flip-face.flip-face-bottom { clip-path: polygon(0 50%,100% 50%,100% 100%,0 100%); }
.detail-flip-face.flip-face-front { z-index: 2; }
.detail-flip-face.flip-face-back { z-index: 1; transform: rotateX(180deg); }
.detail-flip-label { font-size: .6rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); }
.detail-flip-sep { display: flex; align-items: center; padding-bottom: 20px; color: var(--md-sys-color-outline); font-size: 1.5rem; font-weight: 700; }

.detail-body { padding: 8px 20px 32px; }
.detail-section-label { font-size: .6875rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--md-sys-color-primary); padding: 16px 0 8px; }
.detail-card { background: var(--md-sys-color-surface-variant); border-radius: var(--md-shape-medium); overflow: hidden; }
.detail-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent); }
.detail-row:last-child { border-bottom: none; }
.detail-row-icon { color: var(--md-sys-color-on-surface-variant); margin-top: 1px; }
.detail-row-icon svg { width: 20px; height: 20px; }
.detail-row-body { flex: 1; }
.detail-row-label { font-size: .6875rem; color: var(--md-sys-color-on-surface-variant); margin-bottom: 2px; font-weight: 500; }
.detail-row-value { font-size: .9375rem; line-height: 1.5; }
.detail-actions { display: flex; gap: 10px; margin-top: 20px; }

/* Edit Sheet */
.edit-sheet-inner { padding: 4px 20px 40px; }
.edit-headline { font-size: 1.125rem; font-weight: 700; color: var(--md-sys-color-on-surface); padding: 16px 0 20px; }
.m3-field { position: relative; margin-bottom: 18px; }
.m3-field-label { position: absolute; top: 14px; left: 14px; font-size: .875rem; color: var(--md-sys-color-on-surface-variant); pointer-events: none; transition: all 200ms; background: var(--md-sys-color-surface); padding: 0 4px; }
.m3-input { width: 100%; border: 1.5px solid var(--md-sys-color-outline); border-radius: var(--md-shape-small); padding: 20px 14px 8px; font-size: .9375rem; font-family: var(--font); color: var(--md-sys-color-on-surface); background: var(--md-sys-color-surface); outline: none; transition: border-color 200ms; }
.m3-input:focus { border-color: var(--md-sys-color-primary); border-width: 2px; }
.m3-input:focus + .m3-field-label, .m3-input:not(:placeholder-shown) + .m3-field-label { top: -8px; font-size: .6875rem; font-weight: 600; color: var(--md-sys-color-primary); }
textarea.m3-input { resize: vertical; min-height: 88px; padding-top: 22px; }
.m3-input[type=date]::-webkit-calendar-picker-indicator, .m3-input[type=time]::-webkit-calendar-picker-indicator { opacity: .5; cursor: pointer; }

/* Unit Chips */
.unit-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.unit-chip { height: 36px; padding: 0 16px; border-radius: 18px; border: 1.5px solid var(--md-sys-color-outline-variant); background: transparent; color: var(--md-sys-color-on-surface-variant); font-family: var(--font); font-size: .8125rem; font-weight: 600; cursor: pointer; transition: all var(--ts); display: flex; align-items: center; gap: 6px; }
.unit-chip.selected { background: var(--md-sys-color-secondary-container); border-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary-container); }
.chip-check { display: none; width: 16px; height: 16px; }
.unit-chip.selected .chip-check { display: block; }

/* Buttons */
.m3-btn { flex: 1; height: 44px; border-radius: var(--md-shape-medium); border: 1px solid var(--md-sys-color-outline-variant); background: transparent; color: var(--md-sys-color-on-surface-variant); font-family: var(--font); font-size: .875rem; font-weight: 700; cursor: pointer; transition: background var(--ts); }
.m3-btn:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 6%, transparent); }
.m3-btn.danger { color: var(--md-sys-color-error); border-color: var(--md-sys-color-error); }
.m3-btn.filled { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border-color: transparent; }

/* Image Input */
.img-input-wrap { display: flex; gap: 8px; align-items: stretch; margin-bottom: 18px; }
.img-url-input { flex: 1; margin-bottom: 0 !important; }
.img-or-divider { display: flex; align-items: center; font-size: .75rem; font-weight: 700; color: var(--md-sys-color-outline); }
.img-file-btn { padding: 0 18px; border-radius: var(--md-shape-small); border: 1.5px solid var(--md-sys-color-outline); background: transparent; color: var(--md-sys-color-primary); font-family: var(--font); font-size: .875rem; font-weight: 700; cursor: pointer; transition: background var(--ts); }
.img-file-btn:hover { background: color-mix(in srgb, var(--md-sys-color-primary) 8%, transparent); }
.img-preview-wrap { margin-bottom: 18px; border-radius: var(--md-shape-medium); overflow: hidden; height: 120px; display: none; }
.img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
.img-clear-btn { display: none; font-size: .75rem; color: var(--md-sys-color-error); background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; margin-top: -12px; margin-bottom: 14px; }
.form-actions { display: flex; gap: 10px; margin-top: 8px; }

/* Menu Popup */
.menu-popup { position: fixed; top: 64px; right: 20px; z-index: 500; background: var(--md-sys-color-surface); border-radius: var(--md-shape-medium); box-shadow: var(--md-elevation-3); min-width: 196px; overflow: hidden; transform-origin: top right; transform: scale(.8); opacity: 0; pointer-events: none; transition: transform var(--te), opacity var(--te); }
.menu-popup.open { transform: scale(1); opacity: 1; pointer-events: all; }
.menu-popup-item { padding: 14px 18px; font-size: .9rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--md-sys-color-on-surface); transition: background var(--ts); }
.menu-popup-item:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 8%, transparent); }
.menu-popup-item svg { width: 20px; height: 20px; stroke: var(--md-sys-color-on-surface-variant); }
.menu-popup-item.danger { color: var(--md-sys-color-error); }
.menu-popup-item.danger svg { stroke: var(--md-sys-color-error); }

/* Snackbar */
.snackbar { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(16px); background: #323232; color: #fff; padding: 12px 22px; border-radius: 8px; font-size: .875rem; font-weight: 500; opacity: 0; pointer-events: none; white-space: nowrap; z-index: 600; box-shadow: var(--md-elevation-3); transition: opacity .22s, transform .22s; }
.snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 2px; }

#file-input, #img-file-input { display: none; }
</style>
</head>
<body>

<div class="app-container">
  <header class="app-bar">
    <span class="app-bar-title">Tageszähler</span>
    <button class="icon-btn ripple-host" id="menu-btn" aria-label="Menü öffnen">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/></svg>
    </button>
  </header>

  <div class="tab-bar" id="tab-bar">
    <div class="tab-item active ripple-host" data-tab="0">Zukünftige Ereignisse</div>
    <div class="tab-item ripple-host" data-tab="1">Vergangene Ereignisse</div>
    <div class="tab-indicator" id="tab-indicator"></div>
  </div>

  <div class="tab-content active" id="tab-0">
    <div class="event-list" id="future-list"></div>
  </div>
  <div class="tab-content" id="tab-1">
    <div class="event-list" id="past-list"></div>
  </div>
</div>

<button class="fab ripple-host" id="add-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Erstellen
</button>

<div class="menu-popup" id="menu-popup">
  <div class="menu-popup-item ripple-host" id="import-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Importieren
  </div>
  <div class="menu-popup-item ripple-host" id="export-btn">

<script>
let events = [];
let editingId = null;
let detailId  = null;
let editImgData = null;
let editImgUrl  = null;
let currentTab = 0;

const save = () => { try { localStorage.setItem('tz_v4', JSON.stringify(events)); } catch(e){} };
function load() {
  try { const r = localStorage.getItem('tz_v4') || localStorage.getItem('tz_v3'); if(r) events = JSON.parse(r); } catch(e){}
}

// ── Ripple Engine ──
document.addEventListener('pointerdown', e => {
  const host = e.target.closest('.ripple-host'); if (!host) return;
  const rect = host.getBoundingClientRect();
  const w = document.createElement('span'); w.className = 'ripple-wave';
  const sz = Math.max(rect.width, rect.height) * 2;
  w.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  host.appendChild(w); w.addEventListener('animationend', () => w.remove());
});

// ── Helpers ──
function getTargetDate(ev) {
  const t = ev.time ? ev.time : '00:00';
  return new Date(`${ev.date}T${t}:00`);
}

function isFuture(ev) { return getTargetDate(ev) >= new Date(); }

function formatDateTime(ev) {
  const d = getTargetDate(ev);
  const dateStr = d.toLocaleDateString('de-DE', { day: 'numeric', month: 'long', year: 'numeric' });
  return ev.time ? `${dateStr}, ${ev.time} Uhr` : dateStr;
}

function showSnackbar(txt) {
  const s = document.getElementById('snackbar'); s.textContent = txt; s.classList.add('show');
  setTimeout(() => s.classList.remove('show'), 3000);
}

function calcParts(ev) {
  const now = new Date();
  const target = getTargetDate(ev);
  let a = target < now ? new Date(target) : new Date(now);
  let b = target < now ? new Date(now) : new Date(target);
  
  let years = b.getFullYear() - a.getFullYear();
  let months = b.getMonth() - a.getMonth();
  if (months < 0) { years--; months += 12; }
  
  let adv = new Date(a); 
  adv.setFullYear(adv.getFullYear() + years); 
  adv.setMonth(adv.getMonth() + months);
  
  let rem = b - adv;
  let weeks = Math.floor(rem / 604800000); rem -= weeks * 604800000;
  let days = Math.floor(rem / 86400000);   rem -= days * 86400000;
  let hours = Math.floor(rem / 3600000);   rem -= hours * 3600000;
  let minutes = Math.floor(rem / 60000);   rem -= minutes * 60000;
  let seconds = Math.floor(rem / 1000);
  
  return { years, months, weeks, days, hours, minutes, seconds };
}

function calcProgress(ev) {
  if (!ev.refDate) return null;
  const now = new Date().getTime();
  const target = getTargetDate(ev).getTime();
  const ref = new Date(ev.refDate + 'T00:00:00').getTime();
  const total = target - ref;
  if (total <= 0) return null;

  if (target >= now) {
    const done = now - ref;
    const pct = Math.min(100, Math.max(0, Math.round((done / total) * 100)));
    return { pct, label: 'Fortschritt' };
  } else {
    const elapsed = target - ref;
    const spanSince = now - ref;
    const pct = Math.min(100, Math.max(0, Math.round((elapsed / spanSince) * 100)));
    return { pct, label: 'Vergangen' };
  }
}

const unitMeta = [
  { key:'years', label:'Jahre', digits:2 }, { key:'months', label:'Monate', digits:2 },
  { key:'weeks', label:'Wochen', digits:2 }, { key:'days', label:'Tage', digits:3 },
  { key:'hours', label:'Stunden', digits:2 }, { key:'minutes', label:'Minuten', digits:2 },
  { key:'seconds', label:'Sekunden', digits:2 }
];

// ── Flip Clock Skeleton Builder (Einmaliger Aufruf pro Container) ──
function buildFlipClockStructure(container, units, large) {
  container.innerHTML = '';
  const wC = large ? 'detail-flip-digit-wrap' : 'flip-digit-wrap';
  const fC = large ? 'detail-flip-face' : 'flip-face';
  const active = unitMeta.filter(m => units.includes(m.key));

  active.forEach((meta, i) => {
    if (i > 0 && large) {
      const sep = document.createElement('div'); sep.className = 'detail-flip-sep'; sep.textContent = ':';
      container.appendChild(sep);
    } else if (i > 0 && !large) {
      const sep = document.createElement('div'); sep.className = 'flip-unit-sep';
      container.appendChild(sep);
    }

    const col = document.createElement('div'); 
    col.className = large ? 'detail-flip-col' : 'flip-col';
    
    const row = document.createElement('div'); 
    row.className = large ? 'detail-flip-digits-row' : 'flip-digits-row';
    row.setAttribute('data-unit', meta.key);

    for (let d = 0; d < meta.digits; d++) {
      const wrap = document.createElement('div');
      wrap.className = `${wC} ${meta.key === 'days' && d===0 && meta.digits===3 ? 'wide' : ''}`;
      wrap.innerHTML = `
        <div class="${fC} flip-face-top flip-face-front">0</div>
        <div class="${fC} flip-face-bottom flip-face-front">0</div>
        <div class="${fC} flip-face-top flip-face-back">0</div>
        <div class="${fC} flip-face-bottom flip-face-back">0</div>
      `;
      row.appendChild(wrap);
    }

    const lbl = document.createElement('div');
    lbl.className = large ? 'detail-flip-label' : 'flip-label';
    lbl.textContent = meta.label;

    col.appendChild(row);
    col.appendChild(lbl);
    container.appendChild(col);
  });
}

// ── Flip Clock Values Updater (Sekündlicher Aufruf, performant ohne innerHTML-Reset) ──
function updateFlipClockValues(container, parts) {
  const rows = container.querySelectorAll('[data-unit]');
  rows.forEach(row => {
    const unit = row.getAttribute('data-unit');
    let val = String(parts[unit] || 0);
    const wraps = row.children;
    while (val.length < wraps.length) val = '0' + val;

    for (let i = 0; i < wraps.length; i++) {
      const wrap = wraps[i];
      const nextDigit = val[i];
      const fronts = wrap.querySelectorAll('.flip-face-front');
      const backs = wrap.querySelectorAll('.flip-face-back');
      
      if (fronts[0].textContent !== nextDigit) {
        backs.forEach(b => b.textContent = nextDigit);
        wrap.classList.add('flipping');
        
        setTimeout(() => {
          fronts.forEach(f => f.textContent = nextDigit);
          wrap.classList.remove('flipping');
        }, 340);
      }
    }
  });
}

// ── Rendering View Loops ──
function renderLists() {
  const futList = document.getElementById('future-list');
  const pastList = document.getElementById('past-list');
  futList.innerHTML = ''; pastList.innerHTML = '';

  let futCount = 0, pastCount = 0;

  events.forEach(ev => {
    const isFut = isFuture(ev);
    const card = document.createElement('div');
    card.className = `event-card ${!isFut ? 'past-card' : ''}`;
    card.setAttribute('data-id', ev.id);
    
    let bgStyle = '';
    if (ev.imgData) bgStyle = `background-image:url(${ev.imgData})`;
    else if (ev.imgUrl) bgStyle = `background-image:url(${encodeURI(ev.imgUrl)})`;

    card.innerHTML = `
      ${bgStyle ? `<div class="card-bg" style="${bgStyle}"></div><div class="card-scrim"></div>` : ''}
      <div class="card-content">
        ${!isFut ? `<div class="card-direction-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Erledigt</div>` : ''}
        <div class="card-name">${ev.name}</div>
        <div class="flip-clock" id="clock-${ev.id}"></div>
        <div id="prog-wrap-${ev.id}" style="display:none">
          <div class="card-progress-label" id="prog-lbl-${ev.id}"></div>
          <div class="card-progress-wrap"><div class="card-progress-bar" id="prog-bar-${ev.id}"></div></div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => openDetail(ev.id));

    if (isFut) { futList.appendChild(card); futCount++; } 
    else { pastList.appendChild(card); pastCount++; }

    const clockContainer = card.querySelector(`#clock-${ev.id}`);
    buildFlipClockStructure(clockContainer, ev.units || ['days', 'hours', 'minutes', 'seconds'], false);
  });

  toggleEmptyState(0, futCount);
  toggleEmptyState(1, pastCount);
  updateAllClocks();
}

function toggleEmptyState(tabIdx, count) {
  const container = document.getElementById(`tab-${tabIdx}`);
  let existing = container.querySelector('.empty-state');
  if (count === 0 && !existing) {
    const e = document.createElement('div'); e.className = 'empty-state';
    e.innerHTML = `
      <div class="empty-icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="empty-headline">Keine Ereignisse</div>
      <div class="empty-body">Tippe auf "Erstellen" unten rechts, um dein erstes Ereignis anzulegen.</div>
    `;
    container.querySelector('.event-list').appendChild(e);
  } else if (count > 0 && existing) {
    existing.remove();
  }
}

function updateAllClocks() {
  const now = new Date();
  events.forEach(ev => {
    const parts = calcParts(ev);
    const clockContainer = document.getElementById(`clock-${ev.id}`);
    if (clockContainer) updateFlipClockValues(clockContainer, parts);

    // Progress updates
    const p = calcProgress(ev);
    const pWrap = document.getElementById(`prog-wrap-${ev.id}`);
    if (p && pWrap) {
      pWrap.style.display = 'block';
      document.getElementById(`prog-lbl-${ev.id}`).textContent = `${p.label} • ${p.pct}%`;
      document.getElementById(`prog-bar-${ev.id}`).style.width = `${p.pct}%`;
    } else if (pWrap) {
      pWrap.style.display = 'none';
    }
  });

  // BUGFIX: Aktualisiere das Detail-Panel live im Sekundentakt
  if (detailId !== null && document.getElementById('detail-sheet').classList.contains('open')) {
    const dev = events.find(e => e.id === detailId);
    if (dev) {
      const dParts = calcParts(dev);
      updateFlipClockValues(document.getElementById('detail-flip-clock'), dParts);
      
      const dp = calcProgress(dev);
      const dpWrap = document.getElementById('detail-progress-wrap');
      if (dp) {
        dpWrap.style.display = 'block';
        document.getElementById('detail-progress-label').textContent = dp.label;
        document.getElementById('detail-progress-pct').textContent = `${dp.pct}%`;
        document.getElementById('detail-progress-fill').style.width = `${dp.pct}%`;
      } else {
        dpWrap.style.display = 'none';
      }
    }
  }
}

// Taktgeber jede Sekunde
setInterval(updateAllClocks, 1000);

// ── Sheets Engine ──
function openSheet(id) {
  document.getElementById('backdrop').classList.add('open');
  document.getElementById(id).classList.add('open');
}
function closeSheets() {
  document.getElementById('backdrop').classList.remove('open');
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
  document.getElementById('menu-popup').classList.remove('open');
  detailId = null; editingId = null;
}
document.getElementById('backdrop').addEventListener('click', closeSheets);
document.querySelectorAll('.sheet-handle').forEach(h => h.addEventListener('click', closeSheets));

// ── Detail View Trigger ──
function openDetail(id) {
  const ev = events.find(e => e.id === id); if (!ev) return;
  detailId = id;
  
  document.getElementById('detail-name').textContent = ev.name;
  document.getElementById('detail-date').textContent = formatDateTime(ev);
  
  const dDesc = document.getElementById('detail-desc');
  const dRow = document.getElementById('detail-desc-row');
  if(ev.desc && ev.desc.trim()) { dDesc.textContent = ev.desc; dRow.style.display = 'flex'; }
  else { dRow.style.display = 'none'; }

  const hero = document.getElementById('detail-hero-bg');
  if (ev.imgData) hero.style.backgroundImage = `url(${ev.imgData})`;
  else if (ev.imgUrl) hero.style.backgroundImage = `url(${encodeURI(ev.imgUrl)})`;
  else hero.style.backgroundImage = 'none';

  const pWrap = document.getElementById('detail-progress-wrap');
  if (!isFuture(ev)) pWrap.classList.add('past-progress'); else pWrap.classList.remove('past-progress');

  // Initialisiere die Großansicht der Flip Clock strukturell einmalig vor dem Öffnen
  buildFlipClockStructure(document.getElementById('detail-flip-clock'), ev.units || ['days', 'hours', 'minutes', 'seconds'], true);
  
  // Sofortige erste Befüllung
  const dParts = calcParts(ev);
  updateFlipClockValues(document.getElementById('detail-flip-clock'), dParts);

  openSheet('detail-sheet');
}

// ── Form Engine ──
document.getElementById('add-btn').addEventListener('click', () => {
  editingId = null; editImgData = null; editImgUrl = null;
  document.getElementById('edit-headline').textContent = 'Neues Ereignis';
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-refdate').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-img-url').value = '';
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-clear-btn').style.display = 'none';
  
  document.querySelectorAll('#unit-wrap .unit-chip').forEach((c, idx) => {
    if(idx < 4) c.classList.add('selected'); else c.classList.remove('selected');
  });
  
  openSheet('edit-sheet');
});

document.getElementById('unit-wrap').addEventListener('click', e => {
  const chip = e.target.closest('.unit-chip'); if (!chip) return;
  chip.classList.toggle('selected');
});

// Image Handling
document.getElementById('img-file-btn').addEventListener('click', () => document.getElementById('img-file-input').click());
document.getElementById('img-file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    editImgData = ev.target.result;
    showImgPreview(editImgData);
  };
  reader.readAsDataURL(file);
});

function showImgPreview(src) {
  const w = document.getElementById('img-preview-wrap');
  document.getElementById('img-preview').src = src; w.style.display = 'block';
  document.getElementById('img-clear-btn').style.display = 'inline-block';
}

document.getElementById('img-clear-btn').addEventListener('click', () => {
  editImgData = null; editImgUrl = null;
  document.getElementById('f-img-url').value = '';
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-clear-btn').style.display = 'none';
});

// CRUD Save Operation
document.getElementById('edit-save-btn').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const refDate = document.getElementById('f-refdate').value;
  const desc = document.getElementById('f-desc').value;
  const urlVal = document.getElementById('f-img-url').value.trim();

  if(!name || !date) { showSnackbar('Name und Datum sind Pflichtfelder.'); return; }

  const chosenUnits = Array.from(document.querySelectorAll('#unit-wrap .unit-chip.selected')).map(c => c.getAttribute('data-unit'));
  if(chosenUnits.length === 0) { showSnackbar('Wähle mindestens eine Zeiteinheit.'); return; }

  if(urlVal) editImgUrl = urlVal;

  const data = {
    id: editingId || 'ev_' + Date.now(),
    name, date, time, refDate, desc,
    units: chosenUnits,
    imgUrl: editImgUrl, imgData: editImgData
  };

  if(editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if(idx !== -1) events[idx] = data;
  } else {
    events.push(data);
  }

  save(); renderLists(); closeSheets();
  showSnackbar(editingId ? 'Ereignis aktualisiert' : 'Ereignis erstellt');
});

document.getElementById('edit-cancel-btn').addEventListener('click', closeSheets);

// Edit Triggered from Details
document.getElementById('detail-edit-btn').addEventListener('click', () => {
  const ev = events.find(e => e.id === detailId); if(!ev) return;
  editingId = detailId;
  
  document.getElementById('edit-headline').textContent = 'Ereignis bearbeiten';
  document.getElementById('f-name').value = ev.name;
  document.getElementById('f-date').value = ev.date;
  document.getElementById('f-time').value = ev.time || '';
  document.getElementById('f-refdate').value = ev.refDate || '';
  document.getElementById('f-desc').value = ev.desc || '';
  document.getElementById('f-img-url').value = ev.imgUrl || '';
  
  editImgData = ev.imgData; editImgUrl = ev.imgUrl;
  if(ev.imgData) showImgPreview(ev.imgData);
  else if(ev.imgUrl) showImgPreview(ev.imgUrl);
  else { document.getElementById('img-preview-wrap').style.display = 'none'; document.getElementById('img-clear-btn').style.display = 'none'; }

  document.querySelectorAll('#unit-wrap .unit-chip').forEach(c => {
    if(ev.units && ev.units.includes(c.getAttribute('data-unit'))) c.classList.add('selected');
    else c.classList.remove('selected');
  });

  document.getElementById('detail-sheet').classList.remove('open');
  document.getElementById('edit-sheet').classList.add('open');
});

// Delete Actions
const performDelete = (id) => {
  events = events.filter(e => e.id !== id); save(); renderLists(); closeSheets(); showSnackbar('Ereignis gelöscht');
};
document.getElementById('detail-delete-btn').addEventListener('click', () => { if(confirm('Soll dieses Ereignis gelöscht werden?')) performDelete(detailId); });

// ── Top Bar Menu Popup ──
document.getElementById('menu-btn').addEventListener('click', e => {
  e.stopPropagation(); document.getElementById('menu-popup').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('menu-popup').classList.remove('open'));

document.getElementById('clear-btn').addEventListener('click', () => {
  if(confirm('Wirklich ALLE Ereignisse unwiderruflich löschen?')) { events = []; save(); renderLists(); showSnackbar('Alle Daten gelöscht'); }
});

// JSON Export/Import
document.getElementById('export-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(events, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `tageszaehler_backup_${Date.now()}.json`; a.click();
  showSnackbar('Backup exportiert');
});
document.getElementById('import-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if(Array.isArray(parsed)) { events = parsed; save(); renderLists(); showSnackbar('Daten erfolgreich importiert'); } 
      else showSnackbar('Ungültiges Dateiformat.');
    } catch(err) { showSnackbar('Fehler beim Lesen der Datei.'); }
  };
  reader.readAsText(file);
});

// ── Tabs Navigation ──
const tabBar = document.getElementById('tab-bar');
const indicator = document.getElementById('tab-indicator');
function updateTabIndicator() {
  const activeTab = tabBar.querySelector(`.tab-item[data-tab="${currentTab}"]`);
  if (activeTab) { indicator.style.left = `${activeTab.offsetLeft}px`; indicator.style.width = `${activeTab.offsetWidth}px`; }
}

tabBar.addEventListener('click', e => {
  const item = e.target.closest('.tab-item'); if(!item) return;
  tabBar.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  
  currentTab = parseInt(item.getAttribute('data-tab'));
  document.querySelectorAll('.tab-content').forEach((c, idx) => {
    if(idx === currentTab) c.classList.add('active'); else c.classList.remove('active');
  });
  updateTabIndicator();
});

window.addEventListener('resize', updateTabIndicator);

// ── App Init ──
load();
renderLists();
setTimeout(updateTabIndicator, 150);
</script>
</body>
</html>
