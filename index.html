<!DOCTYPE html>
<html lang="de" data-theme="system" data-color="purple">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tageszähler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏲️</text></svg>">
<style>
/* ── Dynamische Farbschemata ── */
:root {
  /* Basis-Farben (Default: Lila) */
  --hue-primary: 257;
  --hue-sat: 35%;

  /* System Light */
  --md-sys-color-primary:            hsl(var(--hue-primary), var(--hue-sat), 48%);
  --md-sys-color-on-primary:         #FFFFFF;
  --md-sys-color-primary-container:  hsl(var(--hue-primary), var(--hue-sat), 90%);
  --md-sys-color-on-primary-container: hsl(var(--hue-primary), var(--hue-sat), 20%);
  --md-sys-color-secondary:          #625B71;
  --md-sys-color-secondary-container:#E8DEF8;
  --md-sys-color-surface:            #FEF7FF;
  --md-sys-color-surface-variant:    #E7E0EC;
  --md-sys-color-on-surface:         #1C1B1F;
  --md-sys-color-on-surface-variant: #49454F;
  --md-sys-color-outline:            #79747E;
  --md-sys-color-outline-variant:    #CAC4D0;
  --md-sys-color-background:         #FEF7FF;
  --md-sys-color-error:              #B3261E;

  --flip-bg:    #1C1B1F;
  --flip-text:  #EADDFF;
  --flip-split: hsl(var(--hue-primary), var(--hue-sat), 48%);

  --md-elevation-1: 0 1px 2px rgba(0,0,0,.12), 0 2px 4px rgba(0,0,0,.08);
  --md-elevation-2: 0 1px 2px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.10);
  --md-elevation-3: 0 2px 6px rgba(0,0,0,.16), 0 4px 16px rgba(0,0,0,.12);
  --md-shape-small:  12px;
  --md-shape-medium: 16px;
  --md-shape-large:  28px;
  --md-shape-xl:     36px;
  --font: 'Google Sans', 'Roboto Flex', Roboto, system-ui, sans-serif;
  --ts: 300ms cubic-bezier(0.2, 0, 0, 1);
  --te: 400ms cubic-bezier(0.05, 0.7, 0.1, 1);
}

/* System Dark */
@media (prefers-color-scheme: dark) {
  html[data-theme="system"] {
    --md-sys-color-primary:            hsl(var(--hue-primary), var(--hue-sat), 80%);
    --md-sys-color-on-primary:         hsl(var(--hue-primary), var(--hue-sat), 20%);
    --md-sys-color-primary-container:  hsl(var(--hue-primary), var(--hue-sat), 30%);
    --md-sys-color-on-primary-container: hsl(var(--hue-primary), var(--hue-sat), 90%);
    --md-sys-color-secondary:          #CCC2DC;
    --md-sys-color-secondary-container:#4A4458;
    --md-sys-color-surface:            #141218;
    --md-sys-color-surface-variant:    #2A2831;
    --md-sys-color-on-surface:         #E6E1E5;
    --md-sys-color-on-surface-variant: #CAC4D0;
    --md-sys-color-outline:            #938F99;
    --md-sys-color-outline-variant:    #49454F;
    --md-sys-color-background:         #141218;
    --md-sys-color-error:              #F2B8B5;
    --flip-bg: #2B2930;
  }
}

/* Force Dark */
html[data-theme="dark"] {
  --md-sys-color-primary:            hsl(var(--hue-primary), var(--hue-sat), 80%);
  --md-sys-color-on-primary:         hsl(var(--hue-primary), var(--hue-sat), 20%);
  --md-sys-color-primary-container:  hsl(var(--hue-primary), var(--hue-sat), 30%);
  --md-sys-color-on-primary-container: hsl(var(--hue-primary), var(--hue-sat), 90%);
  --md-sys-color-secondary:          #CCC2DC;
  --md-sys-color-secondary-container:#4A4458;
  --md-sys-color-surface:            #141218;
  --md-sys-color-surface-variant:    #2A2831;
  --md-sys-color-on-surface:         #E6E1E5;
  --md-sys-color-on-surface-variant: #CAC4D0;
  --md-sys-color-outline:            #938F99;
  --md-sys-color-outline-variant:    #49454F;
  --md-sys-color-background:         #141218;
  --md-sys-color-error:              #F2B8B5;
  --flip-bg: #2B2930;
}

/* Colors */
html[data-color="purple"] { --hue-primary: 257; --hue-sat: 35%; }
html[data-color="blue"]   { --hue-primary: 210; --hue-sat: 60%; }
html[data-color="green"]  { --hue-primary: 150; --hue-sat: 50%; }
html[data-color="orange"] { --hue-primary: 25;  --hue-sat: 80%; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--md-sys-color-background);
  color: var(--md-sys-color-on-surface);
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  transition: background var(--ts), color var(--ts);
}

.ripple-host { position: relative; overflow: hidden; }
.ripple-wave {
  position: absolute; border-radius: 50%;
  background: currentColor; opacity: 0; pointer-events: none;
  transform: scale(0); animation: ripple 600ms ease-out forwards;
}
@keyframes ripple { 0% { transform:scale(0); opacity:.22; } 100% { transform:scale(4); opacity:0; } }

/* ── Unified Layout ── */
.app-container { max-width: 1400px; margin: 0 auto; padding-bottom: 96px; }

.app-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 8px; position: sticky; top: 0; z-index: 100;
  background: var(--md-sys-color-background);
}
.app-bar-title { font-size: 1.375rem; font-weight: 600; letter-spacing: -.01em; }

/* Optimierte Touch-Zielgröße für Icons (mind. 48x48px) */
.icon-btn {
  width: 48px; height: 48px; border-radius: 50%; border: none; background: transparent;
  color: var(--md-sys-color-on-surface); display: flex; align-items: center; justify-content: center; cursor: pointer;
  touch-action: manipulation;
}

.tab-bar {
  display: flex; border-bottom: 1px solid var(--md-sys-color-outline-variant);
  padding: 0 20px; position: relative; margin-bottom: 16px;
}
/* Erhöhtes Padding für leichtere Bedienung per Touch */
.tab-item {
  flex: 1; text-align: center; padding: 16px 4px;
  font-size: .875rem; font-weight: 600; color: var(--md-sys-color-on-surface-variant);
  cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; transition: color var(--ts);
  touch-action: manipulation;
}
.tab-item.active { color: var(--md-sys-color-primary); }
.tab-indicator {
  position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 3px 3px 0 0;
  background: var(--md-sys-color-primary); transition: transform var(--ts), width var(--ts);
  width: 0; transform: translateX(0);
}

.tab-content { display: none; padding: 0 20px; }
.tab-content.active { display: block; }

.event-list {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px;
}

/* ── Staggered Animation ── */
.stagger-enter {
  animation: slideUp 0.4s cubic-bezier(0.05, 0.7, 0.1, 1) both;
}
@keyframes slideUp {
  0% { opacity: 0; transform: translateY(30px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Event Card ── */
.event-card {
  border-radius: var(--md-shape-large); overflow: hidden; cursor: pointer; position: relative;
  min-height: 172px; padding: 20px 16px 16px; display: flex; flex-direction: column; justify-content: flex-end;
  box-shadow: var(--md-elevation-1); background: var(--md-sys-color-surface-variant);
  -webkit-tap-highlight-color: transparent; transition: transform 200ms, box-shadow 200ms;
  touch-action: manipulation;
}
.event-card:active { transform: scale(.98); box-shadow: none; }

/* Bild füllt die Karte vollständig aus */
.card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; transition: transform 400ms; pointer-events: none; }
.event-card:hover .card-bg { transform: scale(1.03); }
.card-scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.35) 60%, transparent 100%); pointer-events: none; }
.card-content { position: relative; z-index: 1; display: flex; flex-direction: column; width: 100%; }

.card-name { font-size: 1rem; font-weight: 600; color: rgba(255,255,255,.95); margin-bottom: 12px; line-height: 1.2; }

.card-progress-wrap { width: 100%; height: 4px; background: rgba(255,255,255,.18); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.card-progress-bar { height: 100%; border-radius: 2px; background: var(--md-sys-color-primary); transition: width 0.3s linear; min-width: 2px; }
.card-progress-label { font-size: .65rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-bottom: 4px; }

/* ── Flip Clock ── */
.flip-clock { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.flip-clock:children:last-child { margin-bottom: 0; }
.flip-col { display: flex; flex-direction: column; align-items: center; }
.flip-digits-row { display: flex; gap: 1px; }
.flip-digit-wrap { position: relative; width: 26px; height: 34px; perspective: 150px; }
.flip-digit-wrap.wide { width: 34px; }
.flip-face {
  position: absolute; inset: 0; border-radius: 4px; background: var(--flip-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; color: var(--flip-text); font-variant-numeric: tabular-nums;
  overflow: hidden; backface-visibility: hidden;
}
.flip-face::after { content: ''; position: absolute; left:0; right:0; top:50%; height:1px; background: var(--flip-split); opacity:.55; }
.flip-face-top    { clip-path: polygon(0 0,100% 0,100% 50%,0 50%); }
.flip-face-bottom { clip-path: polygon(0 50%,100% 50%,100% 100%,0 100%); }
.flip-face-front  { z-index: 2; }
.flip-face-back   { z-index: 1; transform: rotateX(180deg); }

.flip-digit-wrap.flipping .flip-face-front { animation: flip-top 340ms ease-in forwards; }
.flip-digit-wrap.flipping .flip-face-back  { animation: flip-bot 340ms ease-out forwards; }
@keyframes flip-top { 0%{transform:rotateX(0deg)} 100%{transform:rotateX(-90deg)} }
@keyframes flip-bot { 0%{transform:rotateX(180deg)} 100%{transform:rotateX(0deg)} }

.flip-label { font-size: .5rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-top: 2px; }

/* ── Empty State ── */
.empty-state { display: flex; flex-direction: column; align-items: center; padding: 64px 20px; color: var(--md-sys-color-on-surface-variant); text-align: center; grid-column: 1 / -1; max-width: 440px; margin: 0 auto; }
.empty-icon-circle { width: 68px; height: 68px; border-radius: 50%; background: var(--md-sys-color-secondary-container); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
.empty-icon-circle svg { width: 34px; height: 34px; stroke: var(--md-sys-color-secondary); }
.empty-headline { font-size: 1rem; font-weight: 600; color: var(--md-sys-color-on-surface); margin-bottom: 6px; }
.empty-body { font-size: .875rem; line-height: 1.6; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  height: 56px; padding: 0 20px 0 16px;
  border-radius: var(--md-shape-large); border: none;
  background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);
  font-family: var(--font); font-size: .875rem; font-weight: 700; letter-spacing: .006em;
  display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: var(--md-elevation-3);
  transition: transform var(--ts), box-shadow var(--ts);
  touch-action: manipulation;
}
.fab:active { transform: scale(.93); box-shadow: var(--md-elevation-1); }
.fab svg { width: 22px; height: 22px; }

/* ── Modals & Backdrops ── */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.54); z-index: 300; opacity: 0; pointer-events: none; transition: opacity var(--ts); }
.backdrop.open { opacity: 1; pointer-events: all; }

/* Flüssiges Scrolling auf iOS Touchgeräten hinzugefügt */
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  max-height: 93dvh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: var(--md-shape-xl) var(--md-shape-xl) 0 0;
  background: var(--md-sys-color-surface); box-shadow: var(--md-elevation-3);
  transform: translateY(100%); transition: transform var(--te);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 32px; height: 4px; border-radius: 2px; background: var(--md-sys-color-outline-variant); margin: 12px auto 0; }

@media (min-width: 768px) {
  .sheet { max-width: 600px; left: 50%; transform: translateX(-50%) translateY(100%); border-radius: var(--md-shape-xl); }
  .sheet.open { transform: translateX(-50%) translateY(0); }
}

/* Detail Sheet */
.detail-hero { position: relative; height: 240px; background: var(--md-sys-color-surface-variant); overflow: hidden; }
/* Ausfüllende Bildskalierung im Hero-Header */
.detail-hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; }
.detail-scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 70%); }
.detail-hero-text { position: absolute; bottom: 0; padding: 20px; }
.detail-hero-title { font-size: 1.375rem; font-weight: 700; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.5); }
.detail-close-btn { position: absolute; top: 12px; left: 12px; width: 48px; height: 48px; border-radius: 50%; background: rgba(0,0,0,.4); border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; touch-action: manipulation; }

.detail-progress-wrap { margin: 20px 20px 0; background: var(--md-sys-color-surface-variant); border-radius: var(--md-shape-medium); padding: 14px 16px; }
.detail-progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.detail-progress-label { font-size: .75rem; font-weight: 700; color: var(--md-sys-color-on-surface-variant); }
.detail-progress-pct { font-size: 1.1rem; font-weight: 800; color: var(--md-sys-color-primary); }
.detail-progress-track { height: 6px; border-radius: 3px; background: var(--md-sys-color-outline-variant); overflow: hidden; }
.detail-progress-fill { height: 100%; border-radius: 3px; background: var(--md-sys-color-primary); transition: width 0.3s linear; min-width: 3px; }

.detail-flip-clock { padding: 20px 20px 4px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.detail-flip-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.detail-flip-digits-row { display: flex; gap: 2px; }
.detail-flip-digit-wrap { position: relative; width: 44px; height: 58px; perspective: 200px; }
.detail-flip-digit-wrap.wide { width: 56px; }
.detail-flip-face { position: absolute; inset: 0; border-radius: 8px; background: var(--flip-bg); display: flex; align-items: center; justify-content: center; font-size: 1.75rem; font-weight: 700; color: var(--flip-text); font-variant-numeric: tabular-nums; overflow: hidden; backface-visibility: hidden; }
.detail-flip-face.flip-face-top { clip-path: polygon(0 0,100% 0,100% 50%,0 50%); }
.detail-flip-face.flip-face-bottom { clip-path: polygon(0 50%,100% 50%,100% 100%,0 100%); }
.detail-flip-face.flip-face-front { z-index: 2; }
.detail-flip-face.flip-face-back { z-index: 1; transform: rotateX(180deg); }
.detail-flip-label { font-size: .6rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); }

.detail-body { padding: 8px 20px 32px; }
.detail-section-label { font-size: .6875rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--md-sys-color-primary); padding: 16px 0 8px; }
.detail-card { background: var(--md-sys-color-surface-variant); border-radius: var(--md-shape-medium); overflow: hidden; }
.detail-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent); }
.detail-row:last-child { border-bottom: none; }
.detail-row-icon { color: var(--md-sys-color-on-surface-variant); margin-top: 1px; }
.detail-row-icon svg { width: 20px; height: 20px; }
.detail-row-body { flex: 1; }
.detail-row-label { font-size: .6875rem; color: var(--md-sys-color-on-surface-variant); margin-bottom: 2px; font-weight: 500; }
.detail-row-value { font-size: .9375rem; line-height: 1.5; }
.detail-actions { display: flex; gap: 10px; margin-top: 20px; }

/* Edit Sheet */
.edit-sheet-inner { padding: 4px 20px 40px; }
.edit-headline { font-size: 1.125rem; font-weight: 700; color: var(--md-sys-color-on-surface); padding: 16px 0 20px; }
.m3-field { position: relative; margin-bottom: 18px; }
.m3-field-label { position: absolute; top: 14px; left: 14px; font-size: .875rem; color: var(--md-sys-color-on-surface-variant); pointer-events: none; transition: all 200ms; background: var(--md-sys-color-surface); padding: 0 4px; }
.m3-input { width: 100%; border: 1.5px solid var(--md-sys-color-outline); border-radius: var(--md-shape-small); padding: 20px 14px 8px; font-size: .9375rem; font-family: var(--font); color: var(--md-sys-color-on-surface); background: var(--md-sys-color-surface); outline: none; transition: border-color 200ms; }
.m3-input:focus { border-color: var(--md-sys-color-primary); border-width: 2px; }
.m3-input:focus + .m3-field-label, .m3-input:not(:placeholder-shown) + .m3-field-label { top: -8px; font-size: .6875rem; font-weight: 600; color: var(--md-sys-color-primary); }
textarea.m3-input { resize: vertical; min-height: 88px; padding-top: 22px; }

/* Unit Chips - Optimierte Höhe für mobile Fingereingabe */
.unit-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.unit-chip { height: 40px; padding: 0 16px; border-radius: 20px; border: 1.5px solid var(--md-sys-color-outline-variant); background: transparent; color: var(--md-sys-color-on-surface-variant); font-family: var(--font); font-size: .8125rem; font-weight: 600; cursor: pointer; transition: all var(--ts); display: flex; align-items: center; gap: 6px; touch-action: manipulation; }
.unit-chip.selected { background: var(--md-sys-color-secondary-container); border-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary-container); }
.chip-check { display: none; width: 16px; height: 16px; }
.unit-chip.selected .chip-check { display: block; }

/* Buttons */
.m3-btn { flex: 1; height: 44px; border-radius: var(--md-shape-medium); border: 1px solid var(--md-sys-color-outline-variant); background: transparent; color: var(--md-sys-color-on-surface-variant); font-family: var(--font); font-size: .875rem; font-weight: 700; cursor: pointer; transition: background var(--ts); touch-action: manipulation; }
.m3-btn:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 6%, transparent); }
.m3-btn.danger { color: var(--md-sys-color-error); border-color: var(--md-sys-color-error); }
.m3-btn.filled { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border-color: transparent; }

/* Image Input */
.img-input-wrap { display: flex; gap: 8px; align-items: stretch; margin-bottom: 18px; }
.img-url-input { flex: 1; margin-bottom: 0 !important; }
.img-or-divider { display: flex; align-items: center; font-size: .75rem; font-weight: 700; color: var(--md-sys-color-outline); }
.img-file-btn { padding: 0 18px; border-radius: var(--md-shape-small); border: 1.5px solid var(--md-sys-color-outline); background: transparent; color: var(--md-sys-color-primary); font-family: var(--font); font-size: .875rem; font-weight: 700; cursor: pointer; transition: background var(--ts); touch-action: manipulation; }

/* Optimierte Bildvorschau (Ausfüllend skaliert) */
.img-preview-wrap { margin-bottom: 18px; border-radius: var(--md-shape-medium); overflow: hidden; height: 160px; display: none; }
.img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
.img-clear-btn { display: none; font-size: .75rem; color: var(--md-sys-color-error); background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; margin-top: -12px; margin-bottom: 14px; touch-action: manipulation; }
.form-actions { display: flex; gap: 10px; margin-top: 8px; }

/* Menu Popup */
.menu-popup { position: fixed; top: 64px; right: 20px; z-index: 500; background: var(--md-sys-color-surface); border-radius: var(--md-shape-medium); box-shadow: var(--md-elevation-3); min-width: 220px; overflow: hidden; transform-origin: top right; transform: scale(.8); opacity: 0; pointer-events: none; transition: transform var(--te), opacity var(--te); padding-bottom: 8px; }
.menu-popup.open { transform: scale(1); opacity: 1; pointer-events: all; }
.menu-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--md-sys-color-primary); padding: 16px 18px 8px; }
.menu-popup-item { padding: 12px 18px; font-size: .9rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--md-sys-color-on-surface); transition: background var(--ts); touch-action: manipulation; }
.menu-popup-item:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 8%, transparent); }
.menu-popup-item svg { width: 20px; height: 20px; stroke: var(--md-sys-color-on-surface-variant); }
.menu-popup-item.danger { color: var(--md-sys-color-error); border-top: 1px solid var(--md-sys-color-outline-variant); margin-top: 8px; }
.menu-popup-item.danger svg { stroke: var(--md-sys-color-error); }

/* Theme Toggles inside Menu */
.theme-options { display: flex; gap: 8px; padding: 0 18px 8px; }
.theme-btn { flex: 1; padding: 8px 0; border: 1px solid var(--md-sys-color-outline-variant); border-radius: 8px; background: transparent; color: var(--md-sys-color-on-surface); font-size: 0.75rem; font-weight: 600; cursor: pointer; touch-action: manipulation; }
.theme-btn.active { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); border-color: var(--md-sys-color-primary); }

.color-options { display: flex; gap: 12px; padding: 0 18px 8px; }
.color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; touch-action: manipulation; }
.color-btn:hover { transform: scale(1.1); }
.color-btn.active { border-color: var(--md-sys-color-on-surface); }
.c-purple { background: #6750A4; }
.c-blue { background: #006494; }
.c-green { background: #1B5E20; }
.c-orange { background: #E65100; }

/* Snackbar */
.snackbar { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(16px); background: #323232; color: #fff; padding: 12px 22px; border-radius: 8px; font-size: .875rem; font-weight: 500; opacity: 0; pointer-events: none; white-space: nowrap; z-index: 600; box-shadow: var(--md-elevation-3); transition: opacity .22s, transform .22s; }
.snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 2px; }

#file-input, #img-file-input { display: none; }
</style>
</head>
<body>

</div>

<div class="backdrop" id="backdrop"></div>

<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="detail-hero" id="detail-hero">
    <div class="detail-hero-bg" id="detail-hero-bg"></div>
    <div class="detail-scrim"></div>
    <button class="detail-close-btn" id="detail-close-btn" aria-label="Schließen"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
    <div class="detail-hero-text"><div class="detail-hero-title" id="detail-name"></div></div>

  <div class="detail-progress-wrap" id="detail-progress-wrap">
    <div class="detail-progress-meta">

      <button class="unit-chip selected ripple-host" data-unit="weeks"><svg class="chip-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Wochen</button>
      <button class="unit-chip selected ripple-host" data-unit="days"><svg class="chip-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Tage</button>
      <button class="unit-chip ripple-host" data-unit="hours"><svg class="chip-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Stunden</button>
      <button class="unit-chip ripple-host" data-unit="minutes"><svg class="chip-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Minuten</button>
      <button class="unit-chip selected ripple-host" data-unit="seconds"><svg class="chip-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Sekunden</button>

    <button class="img-clear-btn" id="img-clear-btn">Bild entfernen</button>
    <div class="form-actions">

</div>

<div class="snackbar" id="snackbar"></div>
<input type="file" id="file-input" accept=".json">
<input type="file" id="img-file-input" accept="image/*">

<script>
/* ── APP STATE ── */
let events = JSON.parse(localStorage.getItem('events')) || [];
let activeTab = 0;
let currentDetailId = null;
let currentEditId = null;
let imgData = null;

const unitTranslations = {
  years: 'Jahre', months: 'Monate', weeks: 'Wochen',
  days: 'Tage', hours: 'Std', minutes: 'Min', seconds: 'Sek'
};

/* ── DOM ELEMENTS ── */
const tabItems = document.querySelectorAll('.tab-item');
const tabContents = document.querySelectorAll('.tab-content');
const tabIndicator = document.getElementById('tab-indicator');
const backdrop = document.getElementById('backdrop');
const menuPopup = document.getElementById('menu-popup');
const detailSheet = document.getElementById('detail-sheet');
const editSheet = document.getElementById('edit-sheet');

/* ── INITIALIZE ── */
function init() {
  updateTabIndicator();
  renderEvents();
  setInterval(tick, 1000);
  applyThemeAndColor();

  window.addEventListener('resize', updateTabIndicator);

  // Tabs
  tabItems.forEach((tab, index) => {
    tab.addEventListener('click', () => {
      activeTab = index;
      tabItems.forEach(t => t.classList.remove('active'));
      tabContents.forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      tabContents[index].classList.add('active');
      updateTabIndicator();
    });
  });

  // Buttons
  document.getElementById('add-btn').addEventListener('click', () => openEditSheet());
  document.getElementById('menu-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    menuPopup.classList.toggle('open');
  });
  document.getElementById('detail-close-btn').addEventListener('click', closeSheets);
  document.getElementById('detail-edit-btn').addEventListener('click', () => openEditSheet(currentDetailId));
  document.getElementById('detail-delete-btn').addEventListener('click', deleteCurrentEvent);
  document.getElementById('edit-cancel-btn').addEventListener('click', closeEditSheet);
  document.getElementById('edit-save-btn').addEventListener('click', saveEvent);

  backdrop.addEventListener('click', () => {
    closeSheets();
    menuPopup.classList.remove('open');
  });
  document.addEventListener('click', (e) => {
    if (!menuPopup.contains(e.target) && e.target.id !== 'menu-btn') menuPopup.classList.remove('open');
  });

  // Settings
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const val = e.target.getAttribute('data-theme-val');
      document.documentElement.setAttribute('data-theme', val);
      localStorage.setItem('theme', val);
    });
  });
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const val = e.target.getAttribute('data-color-val');
      document.documentElement.setAttribute('data-color', val);
      localStorage.setItem('color', val);
    });
  });

  // Unit Toggle
  document.querySelectorAll('.unit-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });

  // Image Inputs
  document.getElementById('img-file-btn').addEventListener('click', () => document.getElementById('img-file-input').click());
  document.getElementById('img-file-input').addEventListener('change', handleImageUpload);
  document.getElementById('f-img-url').addEventListener('input', (e) => setPreview(e.target.value));
  document.getElementById('img-clear-btn').addEventListener('click', clearImage);

  // Data Tools
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (confirm("Wirklich alle Ereignisse löschen?")) { events = []; saveToLocal(); renderEvents(); menuPopup.classList.remove('open'); }
  });
  document.getElementById('export-btn').addEventListener('click', exportData);
  document.getElementById('import-btn').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', importData);

  // Pointerdown verwendet für latenzfreie Touch-Reaktion des Ripple-Effekts
  document.addEventListener('pointerdown', function(e) {
    const target = e.target.closest('.ripple-host');
    if (!target) return;
    const rect = target.getBoundingClientRect();
    const ripple = document.createElement('span');
    const diameter = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = `${diameter}px`;
    ripple.style.left = `${e.clientX - rect.left - diameter/2}px`;
    ripple.style.top = `${e.clientY - rect.top - diameter/2}px`;
    ripple.classList.add('ripple-wave');
    target.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
}

function applyThemeAndColor() {
  const theme = localStorage.getItem('theme') || 'system';
  const color = localStorage.getItem('color') || 'purple';
  document.documentElement.setAttribute('data-theme', theme);
  document.documentElement.setAttribute('data-color', color);
  document.querySelector(`.theme-btn[data-theme-val="${theme}"]`)?.click();
  document.querySelector(`.color-btn[data-color-val="${color}"]`)?.click();
}

function updateTabIndicator() {
  const active = tabItems[activeTab];
  tabIndicator.style.width = active.offsetWidth + 'px';
  tabIndicator.style.transform = `translateX(${active.offsetLeft}px)`;
}

/* ── RENDER & DATA ── */
function saveToLocal() {
  localStorage.setItem('events', JSON.stringify(events));
}

function renderEvents() {
  const futureList = document.getElementById('future-list');
  const pastList = document.getElementById('past-list');
  futureList.innerHTML = '';
  pastList.innerHTML = '';
  const now = new Date().getTime();

  let futureEvents = [];
  let pastEvents = [];

  // 1. Ereignisse in Arrays aufteilen
  events.forEach(ev => {
    const target = new Date(ev.date + (ev.time ? 'T'+ev.time : 'T00:00')).getTime();
    if (target <= now) {
      pastEvents.push({ ...ev, targetTime: target });
    } else {
      futureEvents.push({ ...ev, targetTime: target });
    }
  });

  // 2. Sortieren (Zukunft: Aufsteigend, Vergangenheit: Absteigend)
  futureEvents.sort((a, b) => a.targetTime - b.targetTime);
  pastEvents.sort((a, b) => b.targetTime - a.targetTime);

  // 3. Zusammenführen für die Darstellungsschleife
  const sortedEvents = [...futureEvents, ...pastEvents];

  let futureCount = 0; let pastCount = 0;

  sortedEvents.forEach((ev, i) => {
    const target = ev.targetTime;
    const isPast = target <= now;
    const el = document.createElement('div');
    el.className = 'event-card stagger-enter';
    el.style.animationDelay = `${(isPast ? pastCount : futureCount) * 0.05}s`;

    let pct = 0;
    if (ev.refDate) {
      const ref = new Date(ev.refDate + 'T00:00').getTime();
      if (now < ref) {
        pct = 0;
      } else {
        const total = target - ref;
        pct = total > 0 ? Math.max(0, Math.min(100, ((now - ref) / total) * 100)) : 100;
      }
    }

    let bgStyle = '';
    if (ev.img) bgStyle = `background-image: url('${ev.img}')`;

    let progressHtml = '';
    if (ev.refDate) {
      progressHtml = `
        <div class="card-progress-wrap">
          <div class="card-progress-bar" id="progress-bar-card-${ev.id}" style="width: ${pct}%"></div>
        </div>
      `;
    }

    el.innerHTML = `
      <div class="card-bg" style="${bgStyle}"></div>
      <div class="card-scrim"></div>
      <div class="card-content">
        <div class="card-name">${ev.name}</div>
        <div class="flip-clock" id="clock-card-${ev.id}"></div>
        ${progressHtml}
      </div>
    `;
    el.onclick = () => openDetailSheet(ev.id);

    if (isPast) { pastList.appendChild(el); pastCount++; }
    else { futureList.appendChild(el); futureCount++; }
  });

  if (futureCount === 0) futureList.innerHTML = emptyStateHTML('Keine zukünftigen Ereignisse', 'Erstelle ein neues Ereignis mit dem Plus-Button.');
  if (pastCount === 0) pastList.innerHTML = emptyStateHTML('Keine vergangenen Ereignisse', 'Hier erscheinen Ereignisse, deren Datum erreicht wurde.');
  tick();
}

function emptyStateHTML(title, body) {
  return `
    <div class="empty-state">
      <div class="empty-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="empty-headline">${title}</div>
      <div class="empty-body">${body}</div>
    </div>`;
}

/* ── TIME LOGIC ── */
function tick() {
  const now = new Date().getTime();

  events.forEach(ev => {
    const target = new Date(ev.date + (ev.time ? 'T'+ev.time : 'T00:00')).getTime();
    const diffObj = getDiff(target, now, ev.units);

    const cardContainer = document.getElementById(`clock-card-${ev.id}`);
    if (cardContainer) renderFlipClock(cardContainer, diffObj, false);

    const cardProgress = document.getElementById(`progress-bar-card-${ev.id}`);
    if (cardProgress && ev.refDate) {
      const ref = new Date(ev.refDate + 'T00:00').getTime();
      let pct = 0;
      if (now < ref) {
        pct = 0;
      } else {
        const total = target - ref;
        pct = total > 0 ? Math.max(0, Math.min(100, ((now - ref) / total) * 100)) : 100;
      }
      cardProgress.style.width = pct + '%';
    }

    if (currentDetailId === ev.id) {
      const detailContainer = document.getElementById('detail-flip-clock');
      if (detailContainer) renderFlipClock(detailContainer, diffObj, true);

      if (ev.refDate) {
        const ref = new Date(ev.refDate + 'T00:00').getTime();
        let pct = 0;
        if (now < ref) {
          pct = 0;
        } else {
          const total = target - ref;
          pct = total > 0 ? Math.max(0, Math.min(100, ((now - ref) / total) * 100)) : 100;
        }

        document.getElementById('detail-progress-fill').style.width = pct + '%';
        document.getElementById('detail-progress-pct').innerText = pct.toFixed(1) + '%';
      }
    }
  });
}

function getDiff(target, now, unitsList) {
  let diff = Math.abs(target - now);
  const isPast = target <= now;
  const res = [];

  const sec = 1000, min = sec * 60, hr = min * 60, day = hr * 24, wk = day * 7, mo = day * 30.436875, yr = day * 365.25;
  const map = { years: yr, months: mo, weeks: wk, days: day, hours: hr, minutes: min, seconds: sec };

  unitsList.forEach(u => {
    const val = Math.floor(diff / map[u]);
    res.push({ unit: u, val: val });
    diff -= val * map[u];
  });
  return res;
}

/* ── FLIP CLOCK RENDERER ── */
function renderFlipClock(container, diffObj, isWide) {
  diffObj.forEach((item, i) => {
    const idStr = container.id + '-' + item.unit;
    let col = document.getElementById(idStr);

    if (!col) {
      col = document.createElement('div');
      col.className = 'flip-col';
      col.id = idStr;

      const row = document.createElement('div');
      row.className = isWide ? 'detail-flip-digits-row' : 'flip-digits-row';
      col.appendChild(row);

      const label = document.createElement('div');
      label.className = isWide ? 'detail-flip-label' : 'flip-label';
      label.innerText = unitTranslations[item.unit];
      col.appendChild(label);

      container.appendChild(col);
    }

    const row = col.firstElementChild;
    const valStr = String(item.val).padStart(2, '0');

    while (row.children.length < valStr.length) {
      const wrap = document.createElement('div');
      wrap.className = (isWide ? 'detail-flip-digit-wrap wide' : 'flip-digit-wrap');
      wrap.innerHTML = `
        <div class="${isWide ? 'detail-flip-face flip-face-top flip-face-front' : 'flip-face flip-face-top flip-face-front'}">0</div>
        <div class="${isWide ? 'detail-flip-face flip-face-bottom flip-face-front' : 'flip-face flip-face-bottom flip-face-front'}">0</div>
        <div class="${isWide ? 'detail-flip-face flip-face-top flip-face-back' : 'flip-face flip-face-top flip-face-back'}">0</div>
        <div class="${isWide ? 'detail-flip-face flip-face-bottom flip-face-back' : 'flip-face flip-face-bottom flip-face-back'}">0</div>
      `;
      row.appendChild(wrap);
    }
    while (row.children.length > valStr.length) { row.lastElementChild.remove(); }

    for (let d = 0; d < valStr.length; d++) {
      const digitWrap = row.children[d];
      const newVal = valStr[d];
      const oldVal = digitWrap.dataset.val;

      if (newVal !== oldVal) {
        digitWrap.dataset.val = newVal;
        if (oldVal !== undefined) {
          digitWrap.classList.remove('flipping');
          void digitWrap.offsetWidth;

          digitWrap.children[0].innerText = oldVal;
          digitWrap.children[1].innerText = oldVal;
          digitWrap.children[2].innerText = newVal;
          digitWrap.children[3].innerText = newVal;

          digitWrap.classList.add('flipping');

          setTimeout(() => {
            digitWrap.children[0].innerText = newVal;
            digitWrap.children[1].innerText = newVal;
            digitWrap.classList.remove('flipping');
          }, 340);
        } else {
          digitWrap.children[0].innerText = newVal;
          digitWrap.children[1].innerText = newVal;
          digitWrap.children[2].innerText = newVal;
          digitWrap.children[3].innerText = newVal;
        }
      }
    }
  });
}


/* ── MODALS & FORMS ── */
function openDetailSheet(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  currentDetailId = id;

  document.getElementById('detail-name').innerText = ev.name;
  document.getElementById('detail-hero-bg').style.backgroundImage = ev.img ? `url('${ev.img}')` : '';

  const d = new Date(ev.date + (ev.time ? 'T'+ev.time : ''));
  document.getElementById('detail-date').innerText = d.toLocaleDateString('de-DE', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + (ev.time ? `, ${ev.time} Uhr` : '');

  if (ev.desc) {
    document.getElementById('detail-desc-row').style.display = 'flex';
    document.getElementById('detail-desc').innerText = ev.desc;
  } else {
    document.getElementById('detail-desc-row').style.display = 'none';
  }

  const pWrap = document.getElementById('detail-progress-wrap');
  if (ev.refDate) {
    pWrap.style.display = 'block';
  } else {
    pWrap.style.display = 'none';
  }

  document.getElementById('detail-flip-clock').innerHTML = '';
  backdrop.classList.add('open');
  detailSheet.classList.add('open');
  tick();
}

function openEditSheet(id = null) {
  closeSheets();
  currentEditId = id;
  imgData = null;
  clearImage();
  document.getElementById('edit-headline').innerText = id ? 'Ereignis bearbeiten' : 'Neues Ereignis';

  if (id) {
    const ev = events.find(e => e.id === id);
    document.getElementById('f-name').value = ev.name;
    document.getElementById('f-date').value = ev.date;
    document.getElementById('f-time').value = ev.time || '';
    document.getElementById('f-refdate').value = ev.refDate || '';
    document.getElementById('f-desc').value = ev.desc || '';

    document.querySelectorAll('.unit-chip').forEach(c => {
      if (ev.units.includes(c.dataset.unit)) c.classList.add('selected'); else c.classList.remove('selected');
    });

    if (ev.img) {
      document.getElementById('f-img-url').value = ev.img.startsWith('http') ? ev.img : '';
      setPreview(ev.img);
      if (!ev.img.startsWith('http')) imgData = ev.img;
    }
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-date').value = '';
    document.getElementById('f-time').value = '';
    document.getElementById('f-refdate').value = '';
    document.getElementById('f-desc').value = '';
    document.querySelectorAll('.unit-chip').forEach(c => {
      const u = c.dataset.unit;
      if (['years','months','weeks','days','seconds'].includes(u)) c.classList.add('selected'); else c.classList.remove('selected');
    });
  }

  setTimeout(() => {
    backdrop.classList.add('open');
    editSheet.classList.add('open');
  }, 100);
}

function closeSheets() {
  backdrop.classList.remove('open');
  detailSheet.classList.remove('open');
  editSheet.classList.remove('open');
  currentDetailId = null;
}

function closeEditSheet() {
  closeSheets();
  if (currentEditId) openDetailSheet(currentEditId);
}

function saveEvent() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const refDate = document.getElementById('f-refdate').value;
  const desc = document.getElementById('f-desc').value.trim();
  const imgUrl = document.getElementById('f-img-url').value.trim();

  const units = Array.from(document.querySelectorAll('.unit-chip.selected')).map(c => c.dataset.unit);

  if (!name || !date) return showSnackbar('Bitte Name und Datum ausfüllen.');
  if (units.length === 0) return showSnackbar('Mindestens eine Zeiteinheit auswählen.');

  const ev = {
    id: currentEditId || Date.now().toString(),
    name, date, time, refDate, desc, units,
    img: imgUrl || imgData || null
  };

  if (currentEditId) {
    const idx = events.findIndex(e => e.id === currentEditId);
    events[idx] = ev;
    showSnackbar('Geändert!');
  } else {
    events.push(ev);
    showSnackbar('Erstellt!');
  }

  saveToLocal();
  renderEvents();
  closeSheets();
}

function deleteCurrentEvent() {
  if (confirm('Dieses Ereignis löschen?')) {
    events = events.filter(e => e.id !== currentDetailId);
    saveToLocal();
    renderEvents();
    closeSheets();
    showSnackbar('Gelöscht.');
  }
}

/* ── IMAGE HANDLING ── */
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    imgData = ev.target.result;
    document.getElementById('f-img-url').value = '';
    setPreview(imgData);
  };
  reader.readAsDataURL(file);
}

function setPreview(src) {
  const wrap = document.getElementById('img-preview-wrap');
  const img = document.getElementById('img-preview');
  const clear = document.getElementById('img-clear-btn');
  if (src) {
    img.src = src;
    wrap.style.display = 'block';
    clear.style.display = 'block';
  } else {
    clearImage();
  }
}

function clearImage() {
  imgData = null;
  document.getElementById('f-img-url').value = '';
  document.getElementById('img-file-input').value = '';
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-clear-btn').style.display = 'none';
}

/* ── UTILS ── */
function showSnackbar(msg) {
  const sb = document.getElementById('snackbar');
  sb.innerText = msg;
  sb.classList.add('show');
  setTimeout(() => sb.classList.remove('show'), 3000);
}

function exportData() {
  const data = JSON.stringify(events);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'tageszaehler_export.json';
  a.click();
  menuPopup.classList.remove('open');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        events = data;
        saveToLocal();
        renderEvents();
        showSnackbar('Erfolgreich importiert!');
      } else throw new Error();
    } catch {
      showSnackbar('Fehler beim Importieren der Datei.');
    }
  };
  reader.readAsText(file);
  menuPopup.classList.remove('open');
}

init();
</script>
